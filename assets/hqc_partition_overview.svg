<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="700" viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Assessment-guided partition of hybrid quantum-classical scheduling workflows</title>
  <desc id="desc">A minimalist academic SVG diagram showing evidence, workflow case, assessment rules, and partition recommendation. Only binary commitment is quantum-eligible; feasibility, update, and postprocessing remain classical.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .line { stroke: #374151; stroke-width: 2.2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .thin { stroke: #9ca3af; stroke-width: 1.5; fill: none; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2.2; rx: 0; }
      .soft { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; rx: 0; }
      .qbox { fill: #eef4ee; stroke: #3f5f3b; stroke-width: 2; rx: 0; }
      .blue { fill: #1f4e79; }
      .green { fill: #3f5f3b; }
      .small { font: 400 28px Georgia, 'Times New Roman', serif; }
      .body { font: 400 32px Georgia, 'Times New Roman', serif; }
      .label { font: 600 34px Georgia, 'Times New Roman', serif; }
      .title { font: 600 48px Georgia, 'Times New Roman', serif; }
      .subtitle { font: italic 400 30px Georgia, 'Times New Roman', serif; }
      .mono { font: 600 34px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1px; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="700"/>

  <!-- Title -->
  <text x="800" y="70" text-anchor="middle" class="title ink">
    Assessment-Guided Partition of Hybrid Quantum–Classical Scheduling Workflows
  </text>
  <text x="800" y="116" text-anchor="middle" class="subtitle muted">
    Conservative decision support for placing quantum optimisation components in digital energy workflows
  </text>

  <!-- Main panels -->
  <g transform="translate(70,170)">
    <rect class="box" width="300" height="300"/>
    <text x="150" y="58" text-anchor="middle" class="label ink">1. Evidence</text>
    <line x1="28" y1="82" x2="272" y2="82" class="line"/>
    <text x="150" y="130" text-anchor="middle" class="body ink">Public sources</text>
    <text x="150" y="174" text-anchor="middle" class="body ink">Case evidence</text>
    <text x="150" y="218" text-anchor="middle" class="body ink">Energy context</text>
  </g>

  <line x1="390" y1="320" x2="460" y2="320" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(480,170)">
    <rect class="box" width="300" height="300"/>
    <text x="150" y="58" text-anchor="middle" class="label ink">2. Workflow Case</text>
    <line x1="28" y1="82" x2="272" y2="82" class="line"/>
    <text x="150" y="128" text-anchor="middle" class="body ink">Unit commitment</text>
    <text x="150" y="172" text-anchor="middle" class="body ink">Operational constraints</text>
    <text x="150" y="216" text-anchor="middle" class="body green">Binary structure present</text>
  </g>

  <line x1="800" y1="320" x2="870" y2="320" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(890,170)">
    <rect class="box" width="300" height="300"/>
    <text x="150" y="58" text-anchor="middle" class="label ink">3. Assessment</text>
    <line x1="28" y1="82" x2="272" y2="82" class="line"/>
    <text x="150" y="128" text-anchor="middle" class="body ink">Evidence maturity</text>
    <text x="150" y="172" text-anchor="middle" class="body ink">Comparator strength</text>
    <text x="150" y="216" text-anchor="middle" class="body ink">Encoding overhead</text>
    <text x="150" y="260" text-anchor="middle" class="body green">Admissibility: exploratory</text>
  </g>

  <line x1="1210" y1="320" x2="1280" y2="320" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(1300,170)">
    <rect class="box" width="300" height="300"/>
    <text x="150" y="58" text-anchor="middle" class="label ink">4. Partition</text>
    <line x1="28" y1="82" x2="272" y2="82" class="line"/>

    <rect x="30" y="112" width="240" height="58" class="soft"/>
    <text x="150" y="151" text-anchor="middle" class="small ink">Preparation: classical</text>

    <rect x="30" y="182" width="240" height="72" class="qbox"/>
    <text x="82" y="227" text-anchor="middle" class="mono green">010</text>
    <text x="190" y="211" text-anchor="middle" class="small ink">Binary commitment</text>
    <text x="190" y="242" text-anchor="middle" class="small green">exploratory quantum</text>

    <rect x="30" y="266" width="240" height="58" class="soft"/>
    <text x="150" y="305" text-anchor="middle" class="small ink">Feasibility/update: classical</text>
  </g>

  <!-- Key message -->
  <g transform="translate(250,525)">
    <rect width="1100" height="104" fill="#ffffff" stroke="#374151" stroke-width="2.2"/>
    <text x="550" y="43" text-anchor="middle" class="label ink">Decision support, not solver evaluation.</text>
    <text x="550" y="78" text-anchor="middle" class="small muted">
      Only binary commitment is quantum-eligible; feasibility checks, rolling updates, and postprocessing remain classical.
    </text>
  </g>
</svg>
